name: News Bot

on:
  schedule:
    # All times are UTC. Each Italian target time has two entries to cover
    # both CET (UTC+1, Oct-Mar) and CEST (UTC+2, Mar-Oct).
    # The Python script uses a ±25 min window check to avoid double-sending.

    # 08:00 IT → 07:00 UTC (CET) / 06:00 UTC (CEST)
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"

    # 10:30 IT → 09:30 UTC (CET) / 08:30 UTC (CEST)
    - cron: "30 8 * * *"
    - cron: "30 9 * * *"

    # 20:30 IT → 19:30 UTC (CET) / 18:30 UTC (CEST)
    - cron: "30 18 * * *"
    - cron: "30 19 * * *"

  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      force:
        description: "Skip time check and send immediately"
        required: false
        default: "false"
        type: boolean

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python news_bot.py --force
          else
            python news_bot.py
          fi
